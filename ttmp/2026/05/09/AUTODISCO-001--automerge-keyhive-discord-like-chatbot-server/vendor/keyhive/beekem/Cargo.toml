[package]
name = "beekem"
version = "0.1.0"
description = "BeeKEM: a concurrent variant of TreeKEM for Continuous Group Key Agreement"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
blake3 = { version = "1.5", default-features = false }
chacha20poly1305 = { workspace = true }
ed25519-dalek = { version = "2.1", default-features = false, features = ["rand_core", "serde"] }
future_form = { workspace = true }
keyhive_crypto = { version = "0.1.0", path = "../keyhive_crypto", default-features = false }
nonempty = { workspace = true }
rand = { version = "0.8.5", default-features = false }
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
tracing = { version = "0.1.40", default-features = false, features = ["attributes"] }

# std-only dependencies
dupe = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }

arbitrary = { workspace = true, optional = true }

[dev-dependencies]
arbitrary = { workspace = true }
tokio = { version = "1.43", features = ["macros", "rt"] }

[features]
default = ["std"]
std = [
    "blake3/std",
    "dupe",
    "ed25519-dalek/std",
    "keyhive_crypto/std",
    "rand/std",
    "rand/std_rng",
    "serde/std",
    "serde/rc",
    "thiserror",
    "tracing/std",
]
arbitrary = ["dep:arbitrary", "keyhive_crypto/arbitrary"]
test_utils = []

[lints.clippy]
doc_overindented_list_items = "allow"
